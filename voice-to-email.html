<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Röst till E-post" />
  <title>Röst till E-post</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      background: #0f0f0f;
      color: #f0f0f0;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 16px;
    }
    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .title {
      font-size: 14px;
      font-weight: 600;
      color: #888;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .lang-row {
      display: flex;
      gap: 4px;
    }
    .lang-btn {
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 500;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #888;
      cursor: pointer;
      touch-action: manipulation;
    }
    .lang-btn.active {
      background: #2a2a2a;
      color: #f0f0f0;
      border-color: #555;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 16px;
    }
    .label {
      font-size: 11px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }
    input[type=email], input[type=text] {
      width: 100%;
      background: #242424;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 15px;
      color: #f0f0f0;
      outline: none;
      -webkit-appearance: none;
    }
    input[type=email]:focus, input[type=text]:focus {
      border-color: #555;
    }
    .subject-label {
      font-size: 13px;
      color: #666;
      margin: 10px 0 6px;
      display: block;
    }
    .rec-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 32px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .rec-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #242424;
      border: 1px solid #333;
      color: #888;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-appearance: none;
      appearance: none;
      outline: none;
      transition: background 0.2s, border-color 0.2s;
      position: relative;
      z-index: 10;
    }
    .rec-btn:active {
      background: #333;
      transform: scale(0.95);
    }
    .rec-btn.recording {
      background: rgba(255,92,92,0.15);
      border-color: #ff5c5c;
      color: #ff5c5c;
    }
    .rec-btn svg {
      width: 28px;
      height: 28px;
      pointer-events: none;
    }
    .rec-status {
      font-size: 14px;
      font-weight: 500;
      color: #666;
      text-align: center;
    }
    .rec-status.active { color: #ff5c5c; }
    .rec-status.done { color: #5cffa0; }
    .rec-status.error { color: #ff5c5c; font-size: 12px; }
    .rec-timer {
      font-size: 13px;
      color: #444;
      font-variant-numeric: tabular-nums;
      min-height: 18px;
      text-align: center;
    }
    textarea {
      width: 100%;
      min-height: 120px;
      background: #242424;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 15px;
      color: #f0f0f0;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      -webkit-appearance: none;
      font-family: system-ui, -apple-system, sans-serif;
    }
    textarea:focus { border-color: #555; }
    textarea::placeholder { color: #444; }
    .char-count {
      font-size: 12px;
      color: #444;
      text-align: right;
      margin-top: 6px;
    }
    .send-btn {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #888;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      touch-action: manipulation;
      -webkit-appearance: none;
      appearance: none;
      transition: background 0.2s;
    }
    .send-btn:not(:disabled):active { background: #2a2a2a; }
    .send-btn.ready { color: #e8ff6e; border-color: rgba(232,255,110,0.3); }
    .send-btn.sent { color: #5cffa0; border-color: rgba(92,255,160,0.3); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .send-btn svg { width: 18px; height: 18px; pointer-events: none; }
    .send-status {
      font-size: 13px;
      color: #555;
      text-align: center;
      min-height: 18px;
    }
    .send-status.ok { color: #5cffa0; }
    .send-status.err { color: #ff5c5c; }
    .debug {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      color: #666;
      font-family: monospace;
      word-break: break-all;
    }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <span class="title">Röst → E-post</span>
    <div class="lang-row">
      <button class="lang-btn active" id="btnSv" onclick="setLang('sv-SE',this)" type="button">🇸🇪 SV</button>
      <button class="lang-btn" id="btnEn" onclick="setLang('en-US',this)" type="button">🇬🇧 EN</button>
    </div>
  </div>

  <div class="card">
    <div class="label">Mottagare</div>
    <input type="email" id="emailTo" value="oscar.lindh@speeron.com" autocomplete="email" inputmode="email" />
    <span class="subject-label" id="subjectLbl">Ämne</span>
    <input type="text" id="emailSubject" value="Röstanteckning" />
  </div>

  <div class="rec-card">
    <button class="rec-btn" id="recBtn" type="button" onclick="handleRec()">
      <svg id="recSvg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="8" y1="22" x2="16" y2="22"/>
      </svg>
    </button>
    <div class="rec-status" id="recStatus">Tryck för att spela in</div>
    <div class="rec-timer" id="recTimer"></div>
  </div>

  <div class="card">
    <div class="label" id="transcriptLbl">Transkription</div>
    <textarea id="transcript" placeholder="Transkriptionen visas här..."></textarea>
    <div class="char-count" id="charCount">0 tecken</div>
  </div>

  <button class="send-btn" id="sendBtn" type="button" onclick="handleSend()" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
    <span id="sendLbl">Skicka e-post</span>
  </button>
  <div class="send-status" id="sendStatus"></div>

  <div class="debug" id="debugBox">Laddar...</div>

</div>
<script>
// --- state ---
var lang = 'sv-SE';
var recording = false;
var recognition = null;
var finalText = '';
var timerSec = 0;
var timerInt = null;

// --- debug helper ---
function dbg(msg) {
  document.getElementById('debugBox').textContent = msg;
}

// --- init ---
window.addEventListener('load', function() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  var hasMD = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
  dbg('SR: ' + (SR ? 'OK' : 'SAKNAS') + ' | getUserMedia: ' + (hasMD ? 'OK' : 'SAKNAS') + ' | HTTPS: ' + (location.protocol === 'https:' ? 'JA' : 'NEJ'));
  document.getElementById('transcript').addEventListener('input', updateCount);
  document.getElementById('emailTo').addEventListener('input', updateCount);
});

// --- lang ---
function setLang(l, btn) {
  if (recording) return;
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  if (l === 'en-US') {
    document.getElementById('subjectLbl').textContent = 'Subject';
    document.getElementById('transcriptLbl').textContent = 'Transcription';
    document.getElementById('recStatus').textContent = 'Tap to record';
    document.getElementById('sendLbl').textContent = 'Send email';
    document.getElementById('transcript').placeholder = 'Transcription appears here...';
  } else {
    document.getElementById('subjectLbl').textContent = 'Ämne';
    document.getElementById('transcriptLbl').textContent = 'Transkription';
    document.getElementById('recStatus').textContent = 'Tryck för att spela in';
    document.getElementById('sendLbl').textContent = 'Skicka e-post';
    document.getElementById('transcript').placeholder = 'Transkriptionen visas här...';
  }
}

// --- recording ---
function handleRec() {
  dbg('Knapp tryckt. recording=' + recording);
  if (recording) {
    stopRec();
  } else {
    startRec();
  }
}

function startRec() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    setStatus('FEL: Web Speech API saknas', 'error');
    dbg('SR saknas helt');
    return;
  }
  setStatus('Begär mikrofontillstånd...', '');
  dbg('Anropar getUserMedia...');

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    dbg('getUserMedia saknas – kör direkt SR');
    beginSR();
    return;
  }

  navigator.mediaDevices.getUserMedia({ audio: true })
    .then(function(stream) {
      stream.getTracks().forEach(function(t){ t.stop(); });
      dbg('getUserMedia OK – startar SR');
      beginSR();
    })
    .catch(function(err) {
      dbg('getUserMedia FEL: ' + err.name + ' ' + err.message);
      setStatus('Mikrofonåtkomst nekad: ' + err.name, 'error');
    });
}

function beginSR() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  finalText = document.getElementById('transcript').value;
  recognition = new SR();
  recognition.lang = lang;
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onstart = function() {
    recording = true;
    timerSec = 0;
    timerInt = setInterval(function(){
      timerSec++;
      var m = Math.floor(timerSec/60);
      var s = timerSec % 60;
      document.getElementById('recTimer').textContent = m + ':' + (s<10?'0':'') + s;
    }, 1000);
    document.getElementById('recBtn').classList.add('recording');
    document.getElementById('recSvg').innerHTML = '<rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor" stroke="none"/>';
    setStatus(lang === 'sv-SE' ? 'Mikrofon aktiv – tala nu' : 'Microphone active – speak now', 'active');
    dbg('SR igång');
  };

  recognition.onresult = function(e) {
    var interim = '', newFinal = '';
    for (var i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) newFinal += e.results[i][0].transcript + ' ';
      else interim += e.results[i][0].transcript;
    }
    if (newFinal) finalText += newFinal;
    document.getElementById('transcript').value = finalText + interim;
    updateCount();
  };

  recognition.onerror = function(e) {
    dbg('SR fel: ' + e.error);
    setStatus('Fel: ' + e.error, 'error');
    stopRec();
  };

  recognition.onend = function() {
    if (recording) recognition.start();
  };

  recognition.start();
}

function stopRec() {
  recording = false;
  clearInterval(timerInt);
  document.getElementById('recTimer').textContent = '';
  if (recognition) { recognition.onend = null; recognition.stop(); }
  document.getElementById('recBtn').classList.remove('recording');
  document.getElementById('recSvg').innerHTML = '<path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/>';
  setStatus(lang === 'sv-SE' ? 'Inspelning klar' : 'Recording done', 'done');
  dbg('Inspelning stoppad');
  updateCount();
}

function setStatus(txt, cls) {
  var el = document.getElementById('recStatus');
  el.textContent = txt;
  el.className = 'rec-status' + (cls ? ' ' + cls : '');
}

// --- count / send button ---
function updateCount() {
  var n = document.getElementById('transcript').value.length;
  document.getElementById('charCount').textContent = n + (lang === 'sv-SE' ? ' tecken' : ' characters');
  var hasEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(document.getElementById('emailTo').value.trim());
  var btn = document.getElementById('sendBtn');
  btn.disabled = n === 0 || !hasEmail;
  btn.className = 'send-btn' + (n > 0 && hasEmail ? ' ready' : '');
}

// --- send ---
function handleSend() {
  var to = document.getElementById('emailTo').value.trim();
  var subject = document.getElementById('emailSubject').value.trim() || 'Röstanteckning';
  var body = document.getElementById('transcript').value.trim();
  var ss = document.getElementById('sendStatus');

  if (!to || !body) { ss.textContent = 'Fyll i e-post och text'; ss.className = 'send-status err'; return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(to)) { ss.textContent = 'Ogiltig e-postadress'; ss.className = 'send-status err'; return; }

  var now = new Date();
  var dateStr = now.toLocaleDateString(lang === 'sv-SE' ? 'sv-SE' : 'en-GB', {year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});
  var prefix = lang === 'sv-SE' ? 'Röstanteckning ' : 'Voice note ';
  var fullBody = prefix + dateStr + ':\n\n' + body;
  window.location.href = 'mailto:' + encodeURIComponent(to) + '?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(fullBody);

  var btn = document.getElementById('sendBtn');
  btn.className = 'send-btn sent';
  document.getElementById('sendLbl').textContent = lang === 'sv-SE' ? 'Öppnar e-postklient...' : 'Opening email client...';
  ss.textContent = lang === 'sv-SE' ? 'E-postklienten öppnas.' : 'Email client opening.';
  ss.className = 'send-status ok';

  setTimeout(function(){
    btn.className = 'send-btn ready';
    document.getElementById('sendLbl').textContent = lang === 'sv-SE' ? 'Skicka e-post' : 'Send email';
    ss.textContent = ''; ss.className = 'send-status';
  }, 4000);
}
</script>
</body>
</html>
